<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Instructor Presenter View</title>
  <link rel="stylesheet" href="../reveal/dist/theme/fonts/source-sans-pro/source-sans-pro.css" />
  <link rel="stylesheet" href="../reveal/dist/theme/fonts/league-gothic/league-gothic.css" />
  <style>
    :root {
      --bg-0: #0f1113;
      --bg-1: #1d232a;
      --panel: rgba(10, 12, 15, 0.82);
      --line: rgba(255, 255, 255, 0.24);
      --text: #f3f1ed;
      --accent: #f0b351;
      --muted: #c6c2ba;
    }
    body {
      font-family: "Source Sans Pro", "Helvetica Neue", Helvetica, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      background: radial-gradient(circle at 15% 10%, #2f3a45 0%, var(--bg-0) 45%, #050607 100%);
      padding: 1.2rem;
    }
    .panel {
      width: min(680px, 92vw);
      background: linear-gradient(150deg, var(--panel), rgba(8, 10, 12, 0.94));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.4);
      padding: 1.4rem;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: "";
      position: absolute;
      right: -18%;
      top: -30%;
      width: 65%;
      height: 70%;
      background: radial-gradient(circle, rgba(240, 179, 81, 0.22) 0%, rgba(240, 179, 81, 0) 70%);
      pointer-events: none;
    }
    .kicker {
      margin: 0 0 0.5rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.75rem;
      color: var(--accent);
    }
    .panel h1 {
      margin-top: 0;
      margin-bottom: 0.7rem;
      font-family: "League Gothic", Impact, sans-serif;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      line-height: 0.98;
    }
    .panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 1.04rem;
    }
    .panel p + p {
      margin-top: 0.8rem;
    }
    .panel p.helper {
      font-size: 0.96rem;
    }
    button {
      margin-top: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      background: linear-gradient(180deg, #f0b351, #d18f30);
      color: #111;
      width: 100%;
      transition: transform 180ms ease, filter 180ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
    code {
      background: rgba(0, 0, 0, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.16);
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="panel">
    <p class="kicker">Instructor Deck</p>
    <h1>Instructor Presenter Launcher</h1>
    <p>Use this page to open the local deck and speaker notes view in one click.</p>
    <button id="open-presenter">Open Deck + Speaker View</button>
    <p class="helper">If the speaker view popup is blocked, allow popups for this host and click again.</p>
    <p class="helper">In the deck window, press <code>F</code> for full screen and <code>S</code> to reopen speaker notes.</p>
  </main>
  <script>
    document.getElementById('open-presenter').addEventListener('click', function () {
      window.open('deck.html?notes=1', 'instructor-deck-main');
    });
  </script>
</body>
</html>
