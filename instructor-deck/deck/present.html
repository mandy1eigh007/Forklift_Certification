<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Instructor Presenter View</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #121212;
      color: #f1f1f1;
    }
    .panel {
      width: min(680px, 92vw);
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1.25rem;
    }
    .panel h1 {
      margin-top: 0;
      font-size: 1.2rem;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      background: #0f62fe;
      color: #fff;
      width: 100%;
    }
    code {
      background: #000;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Instructor Presenter Launcher</h1>
    <p>Use this page to open the local deck and speaker notes view in one click.</p>
    <button id="open-presenter">Open Deck + Speaker View</button>
    <p>If the speaker view popup is blocked, allow popups for this local host and click again.</p>
    <p>In the deck window, press <code>F</code> for full screen and <code>S</code> to reopen speaker notes.</p>
  </main>
  <script>
    document.getElementById('open-presenter').addEventListener('click', function () {
      window.open('deck.html?notes=1', 'instructor-deck-main');
    });
  </script>
</body>
</html>
